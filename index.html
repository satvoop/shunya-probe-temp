<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="shopify-api-key" content="10635c00182be48da1720e2fdc596776">
<script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"></script>
</head>
<body>
<h1>Shunya E4 acceptance detour (GitHub Pages temporary host)</h1>
<p>Each run POSTs a fresh App Bridge session token to shopify-embedded-auth.
Copy any link_token into the local secrets file — never into chat.</p>
<button id="rerun">Run again</button>
<pre id="out">booting App Bridge...
</pre>
<script>
const BASE = "https://ppxefxuoqchhviyogmed.supabase.co/functions/v1";
const out = document.getElementById("out");
const log = (m) => { out.textContent += m + "\n"; };
async function run() {
  log("--- run @ " + new Date().toISOString() + " ---");
  try {
    const token = await shopify.idToken();
    log("App Bridge booted; session token acquired (" + token.length + " chars)");
    const r = await fetch(BASE + "/shopify-embedded-auth", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ token }),
    });
    const text = await r.text();
    let pretty = text;
    try { pretty = JSON.stringify(JSON.parse(text), null, 2); } catch (e) { /* raw */ }
    log("embedded-auth HTTP " + r.status + ":\n" + pretty);
    log("DONE -- screenshot this box");
  } catch (e) {
    log("ERROR: " + e.message);
  }
}
document.getElementById("rerun").addEventListener("click", run);
run();
</script>
</body>
</html>
